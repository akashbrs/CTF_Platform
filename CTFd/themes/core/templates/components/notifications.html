<div x-data="{
    timeLeft: 3,
    timer: null,
    showCountdown() {
        this.timeLeft = 3;
        if(this.timer) clearInterval(this.timer);
        this.timer = setInterval(() => {
            if(this.timeLeft > 0) this.timeLeft--;
            else clearInterval(this.timer);
        }, 1000);
    }
}" @show-toast.window="showCountdown()">
  <div class="position-fixed p-3" style="z-index: 1060; top: 70px; right: 20px; pointer-events: none;">
    <div x-ref="toast" class="toast cyber-toast hide" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000" style="pointer-events: auto; width: 450px;">
      
      <div class="cyber-toast-wrapper">
        <div class="d-flex position-relative">
          <!-- Left Icon -->
          <div class="cyber-toast-icon-wrapper p-3 pe-4 d-flex align-items-center justify-content-center" style="border-right: 1px solid rgba(255,255,255,0.1); margin-right: 10px;">
            <div class="notif-bell-container-toast">
                <div class="circle-1-toast"></div>
                <div class="circle-2-toast"></div>
                <div class="circle-3-toast"></div>
                <i class="fas fa-bell bell-icon-toast"></i>
            </div>
          </div>
          
          <!-- Body -->
          <div class="flex-grow-1 py-3 pe-2">
            <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 mt-2 me-2" data-bs-dismiss="toast" aria-label="Close" style="font-size: 0.6rem; z-index: 10;"></button>
            
            <div class="d-flex align-items-center mb-2 pe-4">
              <span class="cyber-badge-new me-2">NEW</span>
              <strong class="fs-6" style="color: #f8f8ff; letter-spacing: 1px;" x-text="$store.toast.title"></strong>
            </div>
            
            <div class="text-light mb-3 cyber-toast-text" style="font-size: 0.9rem;" x-html="$store.toast.html"></div>
            
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<style>
/* CYBERPUNK TOAST STYLES */
.cyber-toast {
  background: rgba(54, 69, 79, 0.95);
  border: 1px solid #f8f8ff;
  border-radius: 8px;
  
  overflow: hidden;
  position: relative;
}
.cyber-toast::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border: 2px solid rgba(248, 248, 255, 0.5);
  pointer-events: none;
  clip-path: polygon(0 10px, 10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
  margin: 3px;
}
.notif-bell-container-toast {
    position: relative;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.circle-1-toast, .circle-2-toast, .circle-3-toast {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.3);
}
.circle-1-toast { width: 26px; height: 26px; }
.circle-2-toast { width: 42px; height: 42px; }
.circle-3-toast { width: 58px; height: 58px; }

.circle-3-toast::before, .circle-3-toast::after, .circle-2-toast::before {
    content: '';
    position: absolute;
    width: 4px;
    height: 4px;
    background: #1a73e8;
    border-radius: 50%;
}
.circle-3-toast::before { top: -2px; left: 50%; transform: translateX(-50%); }
.circle-3-toast::after { bottom: -2px; left: 50%; transform: translateX(-50%); }
.circle-2-toast::before { left: -2px; top: 50%; transform: translateY(-50%); }

.bell-icon-toast {
    font-size: 1.2rem;
    color: #1a73e8;
    z-index: 2;
}
.cyber-badge-new {
  background: #333333;
  color: #fff;
  font-size: 0.6rem;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 1px;
}
.cyber-toast-text {
  line-height: 1.4;
  color: #f8f8ff !important;
}
.cyber-toast-text p {
  margin: 0;
}
.cyber-view-btn-small {
  background: transparent;
  color: #b026ff;
  border: 1px solid #b026ff;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 4px;
  transition: 0.3s;
}
.cyber-view-btn-small:hover {
  background: rgba(176,38,255,0.2);
  color: #fff;
  
}
.cyber-toast-footer {
  border-top: 1px solid rgba(248, 248, 255, 0.2);
  background: rgba(0,0,0,0.3);
}
</style>


<div x-data>
  <div class="modal fade" x-ref="modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" x-text="$store.modal.title"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p x-html="$store.modal.html"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Got it!</button>
        </div>
      </div>
    </div>
  </div>
</div>
